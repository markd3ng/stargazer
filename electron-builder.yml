appId: party.stargazer.app
productName: Star Gazer
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!aur/*'
  - '!images/*'
  - '!scripts/*'
  - '!extra/*'
  - '!tailwind.config.js'
  - '!postcss.config.js'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: './extra/'
    to: ''
protocols:
  name: 'Star Gazer URI Scheme'
  schemes:
    - 'clash'
    - 'mihomo'
win:
  target:
    - nsis
    - 7z
  artifactName: stargazer-windows-${version}-${arch}-portable.${ext}
nsis:
  artifactName: stargazer-windows-${version}-${arch}-setup.${ext}
  uninstallDisplayName: ${productName}
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  createDesktopShortcut: always
mac:
  target:
    - dmg
  artifactName: stargazer-macos-${version}-${arch}.${ext}
linux:
  executableName: stargazer
  icon: build/icon.png
  desktop:
    entry:
      Name: Star Gazer
      GenericName: Proxy Client
      Comment: A GUI client based on Mihomo
      MimeType: 'x-scheme-handler/clash;x-scheme-handler/mihomo'
      Keywords: proxy;clash;mihomo;vpn;
      StartupWMClass: stargazer
      Icon: stargazer
  target:
    - deb
    - rpm
  maintainer: markd3ng
  category: Utility
  artifactName: stargazer-linux-${version}-${arch}.${ext}
deb:
  afterInstall: 'build/linux/postinst'
  afterRemove: 'build/linux/postuninst'
rpm:
  afterInstall: 'build/linux/postinst'
  afterRemove: 'build/linux/postuninst'
  fpm:
    - '--rpm-rpmbuild-define'
    - '_build_id_links none'
npmRebuild: true
publish: []
